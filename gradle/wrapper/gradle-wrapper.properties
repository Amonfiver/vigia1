/**
 * Archivo: gradle/wrapper/gradle-wrapper.properties
 * Propósito: Configuración del Gradle Wrapper para VIGIA1.
 * Responsabilidad principal: Definir la versión de Gradle a utilizar para builds consistentes.
 * Alcance: Configuración del wrapper de Gradle para el proyecto Android.
 * 
 * Decisiones técnicas relevantes:
 * - Gradle 8.5 para compatibilidad estable con Android Gradle Plugin 8.2.x
 * - distributionUrl apunta a versión binaria oficial de Gradle
 * - validateDistributionUrl habilitado para verificar integridad
 * 
 * Limitaciones temporales del MVP:
 * - Versión fija de Gradle, actualizaciones manuales requeridas
 * 
 * Cambios recientes: 
 * - Corrección a Gradle 8.5 estable (anteriormente 9.0-milestone-1 era inestable)
 * - Añadida cabecera de documentación consistente con el proyecto
 */

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists